<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Website Builder</title>
  <style>
    :root{
      --bg:#f6f7f9;
      --nav:#e9f7df;
      --navBorder:#d7efd0;
      --text:#0f172a;
      --muted:#64748b;
      --line:#e5e7eb;
      --shadow:0 18px 50px rgba(2,6,23,.10);
      --radius:18px;
      --font: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial;
      --sidebarW: 280px;
    }

    *{box-sizing:border-box}
    html,body{height:100%}
    body{
      margin:0;
      font-family:var(--font);
      background:var(--bg);
      color:var(--text);
      overflow:hidden;
      display:flex;
      flex-direction:column;
      min-height:100vh;
    }

    /* NAVBAR */
    header.nav{
      height:56px;
      background:var(--nav);
      border-bottom:1px solid var(--navBorder);
      display:flex;
      align-items:center;
      justify-content:space-between;
      padding:10px 12px;
      gap:10px;
      min-width:0;
      flex:0 0 auto;
      position:relative;
      z-index:5;
    }

    .left{
      display:flex; align-items:center; gap:10px;
      min-width:0; flex:1 1 auto;
    }

    .hamburger{
      width:42px; height:36px;
      border-radius:12px;
      border:1px solid rgba(15,23,42,.10);
      background:rgba(255,255,255,.65);
      cursor:pointer;
      display:grid;
      place-items:center;
      user-select:none;
      flex:0 0 auto;
    }
    body.sidebar-open .hamburger{display:none;}
    .hamburger:active{transform:translateY(1px)}

    .closeBtn{
      width:42px; height:36px;
      border-radius:12px;
      border:1px solid rgba(15,23,42,.10);
      background:rgba(255,255,255,.75);
      cursor:pointer;
      display:none;
      place-items:center;
      user-select:none;
      flex:0 0 auto;
    }
    body.sidebar-open .closeBtn{display:grid;}
    .closeBtn:active{transform:translateY(1px)}

    .titleBlock{min-width:0}
    .title{
      font-weight:900;
      font-size:14px;
      white-space:nowrap;
      overflow:hidden;
      text-overflow:ellipsis;
      letter-spacing:-.2px;
    }
    .subtitle{
      margin-top:2px;
      font-size:12px;
      color:var(--muted);
      white-space:nowrap;
      overflow:hidden;
      text-overflow:ellipsis;
    }

    .save{
      height:36px;
      padding:0 12px;
      border-radius:12px;
      border:1px solid rgba(15,23,42,.12);
      background:rgba(255,255,255,.75);
      cursor:pointer;
      font-weight:900;
      text-transform:lowercase;
      flex:0 0 auto;
    }
    .save:active{transform:translateY(1px)}

    /* MAIN */
    main{
      flex:1 1 auto;
      min-height:0;
      min-width:0;
      position:relative;
      display:flex;
      overflow:hidden;
      background:#fff;
    }

    /* SIDEBAR */
    .sidebar{
      width:var(--sidebarW);
      max-width:85vw;
      height:100%;
      background:var(--nav);
      border-right:1px solid var(--navBorder);
      box-shadow: 12px 0 30px rgba(2,6,23,.10);
      transform: translateX(-100%);
      transition: transform .18s ease;
      flex:0 0 auto;
      display:flex;
      flex-direction:column;
      padding:12px;
      gap:10px;
      position:absolute;
      left:0; top:0;
      z-index:4;
    }
    body.sidebar-open .sidebar{transform: translateX(0);}

    .content{
      flex:1 1 auto;
      min-width:0;
      min-height:0;
      padding:12px;
      transition: transform .18s ease;
    }
    body.sidebar-open .content{
      transform: translateX(min(var(--sidebarW), 85vw));
    }

    .scrim{
      position:absolute;
      inset:0;
      background:rgba(2,6,23,.06);
      opacity:0;
      pointer-events:none;
      transition: opacity .18s ease;
      z-index:3;
    }
    body.sidebar-open .scrim{
      opacity:1;
      pointer-events:auto;
    }

    /* Sidebar UI */
    .menuBtn{
      width:100%;
      border:1px solid rgba(2,6,23,.14);
      background:rgba(255,255,255,.70);
      border-radius:12px;
      padding:10px;
      text-align:left;
      cursor:pointer;
      font-weight:800;
      font-size:12.5px;
    }
    .menuBtn:active{transform:translateY(1px)}

    .sectionRow{
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:10px;
      margin-top:4px;
    }
    .sectionTitle{
      font-weight:900;
      font-size:12px;
    }

    .addBtn{
      height:28px;
      width:28px;
      border-radius:10px;
      border:1px solid rgba(2,6,23,.14);
      background:rgba(255,255,255,.70);
      cursor:pointer;
      font-weight:900;
      line-height:1;
      display:grid;
      place-items:center;
      user-select:none;
    }
    .addBtn:active{transform:translateY(1px)}

    .pageList{
      border:1px solid rgba(2,6,23,.14);
      border-radius:12px;
      padding:10px;
      display:flex;
      flex-direction:column;
      gap:6px;
      background:rgba(255,255,255,.55);
      overflow:auto;
      max-height: 52vh;
    }
    .pageLink{
      border:none;
      background:transparent;
      text-align:left;
      padding:6px 8px;
      border-radius:10px;
      cursor:pointer;
      font-size:12.5px;
      color:#111827;
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:10px;
      min-width:0;
    }
    .pageLink:hover{background:rgba(255,255,255,.70)}
    .pageLink.active{
      background:#0f172a;
      color:#fff;
    }
    .pageName{
      min-width:0;
      overflow:hidden;
      text-overflow:ellipsis;
      white-space:nowrap;
      flex:1 1 auto;
    }

    .spacer{flex:1}

    .footer{
      display:flex;
      flex-direction:column;
      gap:8px;
      padding-top:10px;
      border-top:1px solid var(--navBorder);
      font-size:12.5px;
      color:#111827;
    }

    .profileBtn{
      width:100%;
      border:1px solid rgba(2,6,23,.14);
      background:rgba(255,255,255,.70);
      border-radius:12px;
      padding:10px;
      cursor:pointer;
      display:flex;
      align-items:center;
      gap:10px;
      font-weight:900;
      text-align:left;
    }
    .profileBtn:active{transform:translateY(1px)}
    .dot{
      width:18px;height:18px;border-radius:50%;
      border:1px solid rgba(2,6,23,.22);
      background:#fff;
      flex:0 0 auto;
    }

    .logout{
      border:none;
      background:transparent;
      text-align:left;
      padding:6px 0;
      cursor:pointer;
      color:#334155;
      font-size:12.5px;
      font-weight:800;
    }

    /* PREVIEW iframe shell */
    .frameShell{
      width:100%;
      height:100%;
      background:#fff;
      border:1px solid rgba(2,6,23,.10);
      border-radius:var(--radius);
      box-shadow:var(--shadow);
      overflow:hidden;
      display:flex;
      flex-direction:column;
      min-width:0;
      min-height:0;
    }
    .frameTop{
      flex:0 0 auto;
      padding:10px 12px;
      border-bottom:1px solid var(--line);
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:10px;
      background:linear-gradient(180deg,#fff,#fafafa);
      min-width:0;
    }
    .chip{
      font-size:12px;
      padding:6px 10px;
      border-radius:999px;
      border:1px solid var(--line);
      background:#fff;
      color:#334155;
      font-weight:800;
      white-space:nowrap;
      overflow:hidden;
      text-overflow:ellipsis;
      max-width:55%;
    }
    .hint{
      font-size:12px;
      color:var(--muted);
      white-space:nowrap;
      overflow:hidden;
      text-overflow:ellipsis;
      max-width:45%;
      text-align:right;
    }
    iframe{
      flex:1 1 auto;
      min-width:0;
      min-height:0;
      width:100%;
      height:100%;
      border:0;
      display:block;
      background:#fff;
    }

    /* =========================
       "SCREEN" EDIT VIEW (NO OVERLAY)
       ========================= */
    .view{display:none; height:100%}
    .view.active{display:block}

    .editorShell{
      width:100%;
      height:100%;
      background:#fff;
      border:1px solid rgba(2,6,23,.10);
      border-radius:var(--radius);
      box-shadow:var(--shadow);
      overflow:hidden;
      display:flex;
      flex-direction:column;
      min-width:0;
      min-height:0;
    }
    .editorTop{
      flex:0 0 auto;
      padding:10px 12px;
      border-bottom:1px solid var(--line);
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:10px;
      background:linear-gradient(180deg,#fff,#fafafa);
      min-width:0;
    }
    .editorTitle{
      font-weight:950;
      letter-spacing:-.2px;
      font-size:13px;
      white-space:nowrap;
      overflow:hidden;
      text-overflow:ellipsis;
    }
    .backBtn{
      height:34px;
      padding:0 10px;
      border-radius:12px;
      border:1px solid rgba(2,6,23,.12);
      background:#fff;
      cursor:pointer;
      font-weight:950;
      font-size:12px;
      flex:0 0 auto;
    }
    .backBtn:active{transform:translateY(1px)}

    .editorBody{
      padding:12px;
      overflow:auto;
      display:flex;
      flex-direction:column;
      gap:10px;
    }

    .panel{display:none}
    .panel.active{display:block}

    .field{
      display:flex;
      flex-direction:column;
      gap:6px;
      border:1px solid rgba(2,6,23,.10);
      border-radius:14px;
      padding:10px;
      background:#fff;
    }
    .label{
      font-size:12px;
      color:#334155;
      font-weight:900;
    }
    .input, .select, .textarea{
      width:100%;
      border:1px solid rgba(2,6,23,.12);
      border-radius:12px;
      padding:10px 10px;
      font-size:13px;
      outline:none;
    }
    .textarea{min-height:88px; resize:vertical;}

    .row{
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:10px;
      flex-wrap:wrap;
    }
    .checkRow{
      display:flex; align-items:center; gap:8px;
      font-size:13px; color:#0f172a; font-weight:900;
    }

    .btnRow{
      display:flex;
      gap:10px;
      justify-content:flex-end;
      padding-top:4px;
    }
    .btn{
      height:38px;
      border-radius:12px;
      border:1px solid rgba(2,6,23,.14);
      background:#fff;
      cursor:pointer;
      padding:0 12px;
      font-weight:950;
      font-size:12.5px;
    }
    .btn:active{transform:translateY(1px)}
    .btn.primary{
      background:#0f172a;
      color:#fff;
      border-color:#0f172a;
    }

    .tiny{
      font-size:12px;
      color:var(--muted);
      font-weight:800;
    }

    .logoPreviewWrap{
      display:flex;
      gap:10px;
      align-items:center;
    }
    .logoPreview{
      width:52px;height:52px;
      border-radius:14px;
      border:1px solid rgba(2,6,23,.12);
      background:#fff;
      display:grid;
      place-items:center;
      overflow:hidden;
      flex:0 0 auto;
    }
    .logoPreview img{
      width:100%;
      height:100%;
      object-fit:contain;
      background:#fff;
    }
  </style>
</head>

<body>
  <header class="nav">
    <div class="left">
      <button class="hamburger" id="openSidebarBtn" aria-label="Open sidebar">☰</button>
      <button class="closeBtn" id="closeSidebarBtn" aria-label="Close sidebar">✕</button>

      <div class="titleBlock">
        <div class="title" id="topTitle">Website Builder</div>
        <div class="subtitle" id="topSubtitle">Template Preview</div>
      </div>
    </div>

    <button class="save" id="saveBtn">save</button>
  </header>

  <main>
    <aside class="sidebar" id="sidebar" aria-label="Builder menu">
      <button class="menuBtn" data-panel="logo" type="button">Edit logo</button>
      <button class="menuBtn" data-panel="brand" type="button">Brand Detail</button>
      <button class="menuBtn" data-panel="font" type="button">Edit Font</button>

      <div class="sectionRow">
        <div class="sectionTitle">Select Page</div>
        <button class="addBtn" id="addPageBtn" type="button" aria-label="Add page">+</button>
      </div>

      <div class="pageList" id="pageList"></div>

      <div class="spacer"></div>

      <div class="footer">
        <button class="profileBtn" id="profileBtn" type="button">
          <span class="dot" aria-hidden="true"></span>
          <span>Profile</span>
        </button>
        <button class="logout" id="logoutBtn" type="button">logout</button>
      </div>
    </aside>

    <div class="scrim" id="scrim" aria-hidden="true"></div>

    <section class="content">
      <div class="view active" id="previewView">
        <div class="frameShell">
          <div class="frameTop">
            <span class="chip" id="pageChip">Homepage</span>
            <span class="hint" id="statusText">Ready</span>
          </div>
          <iframe id="previewFrame" src="about:blank" title="Template Preview"></iframe>
        </div>
      </div>

      <div class="view" id="editorView">
        <div class="editorShell">
          <div class="editorTop">
            <div class="editorTitle" id="editorTitle">Edit</div>
            <button class="backBtn" id="backToPreviewBtn" type="button">Back</button>
          </div>

          <div class="editorBody">
            <form class="panel" id="panelLogo">
              <div class="field">
                <div class="label">Upload Logo</div>
                <div class="logoPreviewWrap">
                  <div class="logoPreview">
                    <img id="logoPreviewImg" alt="Logo preview" style="display:none" />
                    <div id="logoPreviewFallback" class="tiny">No logo</div>
                  </div>
                  <div style="flex:1">
                    <input class="input" id="logoFile" type="file" accept="image/*" />
                    <div class="tiny" style="margin-top:6px;">Upload an image (PNG/JPG/SVG).</div>
                  </div>
                </div>

                <div class="row" style="margin-top:8px;">
                  <button class="btn" id="removeLogoBtn" type="button">Remove</button>
                </div>
              </div>

              <div class="field">
                <div class="label">Brand Name</div>
                <input class="input" id="brandNameInput" type="text" placeholder="e.g. Ruhanix Legal" />
              </div>

              <div class="field">
                <div class="label">Need:</div>
                <div class="row">
                  <label class="checkRow">
                    <input id="needLogoChk" type="checkbox" />
                    Logo
                  </label>
                  <label class="checkRow">
                    <input id="needNameChk" type="checkbox" />
                    Name
                  </label>
                </div>
              </div>

              <div class="btnRow">
                <button class="btn primary" type="submit">Update</button>
              </div>
            </form>

            <form class="panel" id="panelBrand">
              <div class="field">
                <div class="label">Name</div>
                <input class="input" id="brandDetailName" type="text" placeholder="Brand name" />
              </div>

              <div class="field">
                <div class="label">Tagline</div>
                <input class="input" id="brandDetailTagline" type="text" placeholder="Your tagline" />
              </div>

              <div class="field">
                <div class="label">Contact</div>
                <div style="display:flex; flex-direction:column; gap:8px;">
                  <input class="input" id="brandEmail" type="email" placeholder="Email" />
                  <input class="input" id="brandPhone" type="tel" placeholder="Phone" />
                  <input class="input" id="brandTel" type="text" placeholder="Tel" />
                </div>
              </div>

              <div class="field">
                <div class="label">Address</div>
                <textarea class="textarea" id="brandAddress" placeholder="Address"></textarea>
              </div>

              <div class="btnRow">
                <button class="btn primary" type="submit">Update</button>
              </div>
            </form>

            <form class="panel" id="panelFont">
              <div class="field">
                <div class="label">Primary Font</div>
                <select class="select" id="primaryFontSelect">
                  <option value="ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial">System (Default)</option>
                  <option value="Arial, Helvetica, sans-serif">Arial</option>
                  <option value="Verdana, Geneva, sans-serif">Verdana</option>
                  <option value="Trebuchet MS, Trebuchet, sans-serif">Trebuchet</option>
                  <option value="Georgia, serif">Georgia</option>
                  <option value="Times New Roman, Times, serif">Times New Roman</option>
                  <option value="Courier New, Courier, monospace">Courier New</option>
                </select>
              </div>

              <div class="field">
                <div class="label">Secondary Font</div>
                <select class="select" id="secondaryFontSelect">
                  <option value="ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial">System (Default)</option>
                  <option value="Arial, Helvetica, sans-serif">Arial</option>
                  <option value="Verdana, Geneva, sans-serif">Verdana</option>
                  <option value="Trebuchet MS, Trebuchet, sans-serif">Trebuchet</option>
                  <option value="Georgia, serif">Georgia</option>
                  <option value="Times New Roman, Times, serif">Times New Roman</option>
                  <option value="Courier New, Courier, monospace">Courier New</option>
                </select>
              </div>

              <div class="btnRow">
                <button class="btn primary" type="submit">Update</button>
              </div>
            </form>

          </div>
        </div>
      </div>
    </section>
  </main>

  <script>
    const statusText = document.getElementById('statusText');
    const pageChip = document.getElementById('pageChip');
    const pageList = document.getElementById('pageList');
    const previewFrame = document.getElementById('previewFrame');

    const previewView = document.getElementById('previewView');
    const editorView = document.getElementById('editorView');
    const editorTitle = document.getElementById('editorTitle');
    const backToPreviewBtn = document.getElementById('backToPreviewBtn');

    const topTitle = document.getElementById('topTitle');
    const topSubtitle = document.getElementById('topSubtitle');

    const panels = {
      logo: document.getElementById('panelLogo'),
      brand: document.getElementById('panelBrand'),
      font: document.getElementById('panelFont'),
    };

    const app = {
      slug: '',
      pages: [],
      entry: 'index.html',
      currentPage: 'index.html'
    };

    function setStatus(msg, ms=900){
      statusText.textContent = msg;
      if(ms){
        setTimeout(()=>{
          statusText.textContent = 'Ready';
        }, ms);
      }
    }

    function prettyName(file){
      if(!file) return 'Page';
      const base = file.split('/').pop() || file;
      const name = base.replace(/\.(html?|php)$/i,'');
      if(name.toLowerCase()==='index') return 'Homepage';
      return name.replace(/[-_]+/g,' ').replace(/\b\w/g, c => c.toUpperCase());
    }

    function getSelectedTemplateId(){
      const params = new URLSearchParams(window.location.search);
      const urlTid = params.get('tid');
      if(urlTid) return urlTid;
      try{
        const stored = JSON.parse(localStorage.getItem('rc_selected_template') || '{}');
        if(stored.id) return stored.id;
      }catch(e){}
      return localStorage.getItem('rc_selected_template_id') || '';
    }

    function buildApiUrl(path){
      const url = new URL(path, window.location.href);
      const tid = getSelectedTemplateId();
      if(tid) url.searchParams.set('tid', tid);
      return url.toString();
    }


        body: JSON.stringify(body)
      });
      return res.json().catch(()=>({ok:false,error:'Bad JSON response'}));
    }

    function openSidebar(){
      document.body.classList.add('sidebar-open');
      setStatus('Menu open', 0);
    }
    function closeSidebar(){
      document.body.classList.remove('sidebar-open');
      setStatus('Ready', 0);
    }

    document.getElementById('openSidebarBtn').addEventListener('click', openSidebar);
    document.getElementById('closeSidebarBtn').addEventListener('click', closeSidebar);
    document.getElementById('scrim').addEventListener('click', closeSidebar);

    function showPreview(){
      editorView.classList.remove('active');
      previewView.classList.add('active');
      setStatus('Ready', 0);
    }

    function showEditor(panelKey){
      closeSidebar();
      previewView.classList.remove('active');
      editorView.classList.add('active');
      Object.values(panels).forEach(p => p.classList.remove('active'));
      panels[panelKey]?.classList.add('active');
      if(panelKey === 'logo') editorTitle.textContent = 'Edit Logo';
      if(panelKey === 'brand') editorTitle.textContent = 'Brand Detail';
      if(panelKey === 'font') editorTitle.textContent = 'Edit Font';
      setStatus('Editing...', 0);
    }

    backToPreviewBtn.addEventListener('click', showPreview);

    document.getElementById('sidebar').addEventListener('click', (e)=>{
      const btn = e.target.closest('.menuBtn');
      if(!btn) return;
      const panel = btn.dataset.panel;
      if(panel && panels[panel]) showEditor(panel);
    });

    function renderPages(activeFile){
      pageList.innerHTML = '';
      app.pages.forEach(file => {
        const btn = document.createElement('button');
        btn.type = 'button';
        btn.className = 'pageLink';
        btn.dataset.page = file;
        btn.innerHTML = `<span class="pageName">${prettyName(file)}</span>`;
        if(file === activeFile) btn.classList.add('active');
        pageList.appendChild(btn);
      });
      if(activeFile) setActivePage(activeFile, false);
    }

    function setActivePage(file, load=true){
      app.currentPage = file;
      pageChip.textContent = prettyName(file);
      pageList.querySelectorAll('.pageLink').forEach(btn => {
        btn.classList.toggle('active', btn.dataset.page === file);
      });
      if(load) loadPreview(file);
      showPreview();
      closeSidebar();
      setStatus('Page selected', 700);
    }

    pageList.addEventListener('click', (e)=>{
      const btn = e.target.closest('.pageLink');
      if(!btn) return;
      setActivePage(btn.dataset.page || 'index.html');
    });

    async function loadTemplateInfo(){
      const data = await apiGet('api/current-template.php');
      if(!data.ok){
        alert(data.error || 'Select a template first!');
        window.location.href = 'templates.html';
        return false;
      }
      app.slug = data.template.slug;
      topTitle.textContent = 'Website Builder';
      topSubtitle.textContent = `${data.template.title || data.template.slug} • ${data.template.category || 'template'}`;
      return true;
    }

    async function loadPages(){
      const pdata = await apiGet('api/template-pages.php');
      if(!pdata.ok){
        setStatus(pdata.error || 'Failed to load pages', 1500);
        return;
      }
      app.pages = pdata.pages || [];
      app.entry = pdata.entry || app.pages[0] || 'index.html';
      if(!app.pages.length){
        app.pages = [app.entry];
      }
      renderPages(app.entry);
    }

    function loadPreview(file){
      if(!app.slug){
        setStatus('Missing template', 1200);
        return;
      }
      setStatus('Loading…', 0);
      const url = `template-view.php?slug=${encodeURIComponent(app.slug)}&page=${encodeURIComponent(file)}&v=${Date.now()}`;
      previewFrame.src = url;
    }

    previewFrame.addEventListener('load', ()=>{
      setStatus('Ready', 700);
    });

    const addBtn = document.getElementById('addPageBtn');
    addBtn.addEventListener('click', async ()=>{
      const newFile = prompt('Enter new page filename (example: services.html)');
      if(!newFile) return;
      if(!/^[a-zA-Z0-9_-]+\.html$/.test(newFile.trim())){
        alert('Use a valid file name like services.html');
        return;
      }
      const duplicateFrom = app.currentPage || app.entry || 'index.html';
      setStatus('Creating page...', 0);
      const result = await apiPost('api/create-page.php', { new_file: newFile.trim(), duplicate_from: duplicateFrom });
      if(result.ok){
        setStatus('Page created', 1200);
        await loadPages();
        setActivePage(newFile.trim());
      }else{
        alert(result.error || 'Page creation failed (create-page.php missing)');
        setStatus('Ready', 900);
      }
    });

    document.getElementById('profileBtn').addEventListener('click', ()=>{
      closeSidebar();
      setStatus('Profile clicked', 900);
    });

    document.getElementById('logoutBtn').addEventListener('click', ()=>{
      closeSidebar();
      setStatus('Logged out (demo)', 900);
    });

    document.getElementById('saveBtn').addEventListener('click', ()=>{
      setStatus('Saved', 900);
    });

    function wireSimpleForms(){
      document.getElementById('panelLogo').addEventListener('submit', (e)=>{
        e.preventDefault();
        setStatus('Logo updated (local only)', 900);
        showPreview();
      });
      document.getElementById('panelBrand').addEventListener('submit', (e)=>{
        e.preventDefault();
        setStatus('Brand updated (local only)', 900);
        showPreview();
      });
      document.getElementById('panelFont').addEventListener('submit', (e)=>{
        e.preventDefault();
        setStatus('Font updated (local only)', 900);
        showPreview();
      });

      const logoFile = document.getElementById('logoFile');
      const logoPreviewImg = document.getElementById('logoPreviewImg');
      const logoPreviewFallback = document.getElementById('logoPreviewFallback');
      const removeLogoBtn = document.getElementById('removeLogoBtn');

      function setLogoPreview(dataUrl){
        if(dataUrl){
          logoPreviewImg.src = dataUrl;
          logoPreviewImg.style.display = 'block';
          logoPreviewFallback.style.display = 'none';
        }else{
          logoPreviewImg.removeAttribute('src');
          logoPreviewImg.style.display = 'none';
          logoPreviewFallback.style.display = 'block';
        }
      }

      logoFile.addEventListener('change', ()=>{
        const file = logoFile.files && logoFile.files[0];
        if(!file) return;
        const reader = new FileReader();
        reader.onload = () => setLogoPreview(String(reader.result || ''));
        reader.readAsDataURL(file);
      });

      removeLogoBtn.addEventListener('click', ()=>{
        setLogoPreview('');
        logoFile.value = '';
      });
    }

    document.addEventListener('keydown', (e)=>{
      if(e.key !== 'Escape') return;
      if(document.body.classList.contains('sidebar-open')) return closeSidebar();
      if(editorView.classList.contains('active')) return showPreview();
    });

    async function init(){
      wireSimpleForms();
      const ok = await loadTemplateInfo();
      if(!ok) return;
      await loadPages();
      setActivePage(app.entry, true);
    }

    init();
  </script>
</body>
</html>
