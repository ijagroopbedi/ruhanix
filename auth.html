<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1.0" />
  <title>Preparing your builder…</title>
  <style>
    *{box-sizing:border-box;margin:0;padding:0}
    body{font-family:Inter,system-ui,-apple-system,sans-serif;background:#fff;color:#111;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px}
    .card{width:min(520px,100%);border:1px solid #e5e5e5;border-radius:18px;padding:22px 18px;box-shadow:0 18px 40px rgba(15,23,42,.08)}
    .title{font-size:1.1rem;font-weight:700;margin-bottom:8px}
    .muted{opacity:.75;font-size:.95rem;line-height:1.4}
    .row{display:flex;gap:12px;align-items:center;margin-top:16px}
    .spin{width:26px;height:26px;border:3px solid #ddd;border-top-color:#111;border-radius:50%;animation:s 0.8s linear infinite}
    @keyframes s{to{transform:rotate(360deg)}}
  </style>
</head>
<body>
  <div class="card">
    <div class="title">Setting up your workspace…</div>
    <div class="muted">No login needed right now. We’re creating your editable site and opening the admin builder.</div>
    <div class="row"><div class="spin"></div><div class="muted" id="status">Creating site…</div></div>
  </div>

  <script>
    function getQueryParam(name){
      const u=new URL(location.href);
      return u.searchParams.get(name);
    }

    async function run(){
      const statusEl = document.getElementById("status");

      const tFromUrl = getQueryParam("t") || "";
      const tFromStorage = localStorage.getItem("rc_selected_template_id") || "";
      const templateId = (tFromUrl || tFromStorage || "").trim();

      const slug = (localStorage.getItem("rc_selected_template_slug") || "my-site").trim();
      const title = (localStorage.getItem("rc_selected_template_title") || "My Site").trim();
      const categoryTheme = (localStorage.getItem("rc_selected_category") || "default").trim();

      if(!templateId){
        statusEl.textContent = "No template selected. Go back and pick a template.";
        return;
      }

      const res = await fetch("api/sites/create.php", {
        method: "POST",
        headers: {"Content-Type":"application/json"},
        credentials: "same-origin",
        body: JSON.stringify({
          template_id: templateId,
          slug: slug,
          title: title,
          category_theme: categoryTheme
        })
      });

      const data = await res.json().catch(()=>null);
      if(!data || !data.ok){
        statusEl.textContent = (data && data.error) ? data.error : "Failed to create site.";
        return;
      }

      statusEl.textContent = "Opening admin…";
      location.href = "admin.html?site=" + encodeURIComponent(data.site_key);
    }

    run();
  </script>
</body>
</html>
