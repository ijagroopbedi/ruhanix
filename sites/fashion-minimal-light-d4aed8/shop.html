<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Shop — Crème Studio</title>
  <link rel="stylesheet" href="assets/style.css" />
</head>
<body data-page="shop">
  <div id="rc-header"></div>

  <main class="section">
    <div class="wrap">
      <div class="card pad">
        <div style="display:flex;align-items:flex-end;justify-content:space-between;gap:12px;flex-wrap:wrap;">
          <div>
            <h1 class="h2" style="font-size:22px;">Shop</h1>
            <p class="p">Search, filter and sort (frontend only).</p>
          </div>

          <div style="display:flex;gap:10px;flex-wrap:wrap;min-width:min(520px,100%);">
            <input class="input" id="q" placeholder="Search products…" />
            <select class="select" id="sort" style="width:auto;min-width:180px;">
              <option value="featured">Sort: Featured</option>
              <option value="priceAsc">Price: Low to High</option>
              <option value="priceDesc">Price: High to Low</option>
              <option value="name">Name: A–Z</option>
            </select>
          </div>
        </div>

        <hr class="sep">

        <div class="chips" id="catChips"></div>
      </div>

      <div class="section">
        <div class="grid-4" id="shopGrid"></div>
      </div>
    </div>
  </main>

  <div id="rc-footer"></div>

  <!-- Quick View Modal -->
  <div class="modal" id="modal" aria-hidden="true">
    <div class="box" role="dialog" aria-modal="true" aria-label="Quick view">
      <div class="top">
        <b id="modalTitle">Quick view</b>
        <button class="iconBtn" id="modalClose" type="button" aria-label="Close">✕</button>
      </div>
      <div class="content">
        <div class="media"><img id="modalImg" alt=""></div>
        <div class="details">
          <h3 id="modalH"></h3>
          <p id="modalP"></p>
          <div class="chips" id="modalChips" style="margin-top:12px;"></div>
          <div class="actions">
            <button class="btn primary" id="modalPrimary" type="button">Add to cart</button>
            <button class="btn" id="modalSecondary" type="button">View product</button>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script src="assets/app.js"></script>
</body>
</html>
