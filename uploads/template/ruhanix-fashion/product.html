<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1"/>
  <title>{brand} - Product</title>
  <meta name="description" content="Product page template with working gallery, variants and cart."/>
  <link rel="icon" href="./assets/favicon.svg" type="image/svg+xml">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="./css/style.css"/>
</head>
<body>
  <div class="topbar">
    <div class="container topbar__inner">
      <div class="topbar__msg">Free Shipping Sitewide • Easy Returns • Secure Payments</div>
      <a class="topbar__link" href="./cart.html">GO TO CART</a>
    </div>
  </div>

  <header class="header">
    <div class="container header__inner">
      <button class="icon-btn header__burger" id="burgerBtn" aria-label="Open menu" aria-controls="mobileDrawer" aria-expanded="false">
        <svg viewBox="0 0 24 24" width="22" height="22" aria-hidden="true">
          <path d="M4 6h16M4 12h16M4 18h16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
        </svg>
      </button>

      <a class="logo" href="./index.html">
        <span class="logo__text" data-brand="short"></span><span class="logo__dot">.</span>
      </a>

      <nav class="nav">
        <a href="./index.html">HOME</a>
        <a href="./index.html#categories">CATEGORIES</a>
        <a class="pilllink" href="./index.html#new">NEW ARRIVALS</a>
        <a href="./cart.html">CART</a>
      </nav>

      <div class="header__actions">
        <a class="icon-btn cart-btn" href="./cart.html" aria-label="Cart">
          <span class="badge" id="cartBadge">0</span>
          <svg viewBox="0 0 24 24" width="22" height="22" aria-hidden="true">
            <path d="M6 7h15l-1.5 8.5H7.2L6 7Z" fill="none" stroke="currentColor" stroke-width="2" stroke-linejoin="round"/>
            <path d="M6 7 5.2 4H3" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
            <path d="M9 21a1 1 0 1 0 0-2 1 1 0 0 0 0 2ZM18 21a1 1 0 1 0 0-2 1 1 0 0 0 0 2Z" fill="none" stroke="currentColor" stroke-width="2"/>
          </svg>
        </a>
      </div>
    </div>
  </header>

  <aside class="drawer" id="mobileDrawer" aria-hidden="true">
    <div class="drawer__overlay" id="drawerOverlay"></div>
    <div class="drawer__panel" role="dialog" aria-modal="true">
      <div class="drawer__top">
        <div class="drawer__brand" data-brand="name"></div>
        <button class="icon-btn" id="drawerClose" aria-label="Close menu">
          <svg viewBox="0 0 24 24" width="22" height="22" aria-hidden="true">
            <path d="M6 6 18 18M18 6 6 18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
          </svg>
        </button>
      </div>
      <nav class="drawer__nav">
        <a href="./index.html">Home</a>
        <a href="./index.html#new">New Arrivals</a>
        <a href="./cart.html">Cart</a>
      </nav>
    </div>
  </aside>

  <main class="section">
    <div class="container">
      <div class="breadcrumb" id="breadcrumb"></div>

      <div class="product-layout">
        <section class="gallery">
          <div class="thumbs" id="thumbs"></div>
          <div class="main-image">
            <span class="badge-float" id="badgeFloat">New Arrival</span>
            <button class="wish-float" id="wishBtn" aria-label="Wishlist">♡</button>
            <img id="mainImg" alt="Product image"/>
          </div>
        </section>

        <section>
          <h1 class="ptitle" id="pTitle"></h1>
          <div class="pmeta" id="pMeta"></div>

          <div class="price-row">
            <div class="pnow" id="pNow"></div>
            <div class="pwas" id="pWas"></div>
            <div class="poff" id="pOff"></div>
          </div>

          <div class="field">
            <div class="field__label">Color: <span id="colorLabel"></span></div>
            <div class="swatches" id="colorSwatches"></div>
          </div>

          <div class="field">
            <div class="field__label">Size:</div>
            <div class="sizes" id="sizes"></div>
          </div>

          <div class="btn-row">
            <button class="btn btn--dark" id="addToCart">ADD TO CART</button>
            <button class="btn btn--primary" id="buyNow">BUY NOW</button>
          </div>

          <div class="divider"></div>

          <div class="panel">
            <div style="font-weight:900; margin-bottom:10px">Check Delivery Date</div>
            <div style="display:grid; grid-template-columns:1fr 140px; gap:10px">
              <input class="input" id="pincode" inputmode="numeric" placeholder="Enter pincode" maxlength="6">
              <button class="btn btn--primary" id="checkPin">Check</button>
            </div>
            <div style="margin-top:10px; font-weight:900" id="pinMsg"></div>
          </div>
        </section>
      </div>
    </div>

    <div class="toast" id="toast" role="status" aria-live="polite"></div>
  </main>

  <script src="./js/config.js"></script>
  <script src="./js/data.js"></script>
  <script src="./js/store.js"></script>
  <script src="./js/common.js"></script>
  <script src="./js/product.js"></script>
</body>
</html>
